<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de gastos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .header-left p { font-size: 13px; color: #666; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .month-selector { display: flex; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 8px; overflow: hidden; }
  .month-btn { padding: 8px 18px; font-size: 13px; color: #888; background: transparent; border: none; cursor: pointer; transition: all 0.15s; }
  .month-btn:hover { color: #ccc; background: #222; }
  .month-btn.active { color: #fff; background: #2a2a2a; }
  .btn-refresh { background: transparent; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn-refresh:hover { color: #ccc; border-color: #444; background: #1a1a1a; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #1a1a1a; border: 0.5px solid #222; border-radius: 8px; padding: 16px; }
  .metric-label { font-size: 11px; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-size: 18px; font-weight: 500; color: #e8e8e8; }
  .metric-value.danger { color: #E24B4A; }
  .metric-value.success { color: #639922; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .chart-card { background: #1a1a1a; border: 0.5px solid #222; border-radius: 12px; padding: 1.25rem; }
  .chart-title { font-size: 11px; font-weight: 500; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .table-card { background: #1a1a1a; border: 0.5px solid #222; border-radius: 12px; padding: 1.25rem; }
  .ranking-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ranking-table tr { border-bottom: 0.5px solid #222; }
  .ranking-table tr:last-child { border-bottom: none; }
  .ranking-table td { padding: 9px 4px; color: #e8e8e8; vertical-align: middle; }
  .ranking-table td:first-child { color: #444; width: 22px; font-size: 12px; }
  .ranking-table td:last-child { text-align: right; font-weight: 500; white-space: nowrap; }
  .bar-bg { background: #222; border-radius: 3px; height: 3px; margin-top: 5px; }
  .bar-fill { height: 3px; border-radius: 3px; }
  .pct-label { font-size: 11px; color: #555; font-weight: 400; }
  .loading { text-align: center; padding: 4rem 0; color: #444; font-size: 14px; }
  .error-msg { background: #2a1010; color: #E24B4A; border: 0.5px solid #3a1515; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 1rem; }
  @media (max-width: 540px) { .charts { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Gastos personales</h1>
      <p id="dashSub">Cargando...</p>
    </div>
    <div class="header-right">
      <div class="month-selector" id="monthSelector"></div>
      <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
    </div>
  </div>
  <div id="errorBox" style="display:none;" class="error-msg"></div>
  <div id="loadingBox" class="loading">Conectando con Google Sheets...</div>
  <div id="content" style="display:none;">
    <div class="metrics" id="metricsBox"></div>
    <div class="charts">
      <div class="chart-card">
        <p class="chart-title">Por categoría</p>
        <div style="position:relative; height:200px;"><canvas id="donutChart"></canvas></div>
        <div class="legend" id="donutLegend"></div>
      </div>
      <div class="chart-card">
        <p class="chart-title">Por fecha</p>
        <div style="position:relative; height:200px;"><canvas id="barChart"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <p class="chart-title">Ranking de categorías</p>
      <table class="ranking-table" id="rankingTable"></table>
    </div>
  </div>
</div>

<script>
const MESES = [
  { label: 'Mayo 2026',  url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSR-jEHWGJNTU5Wk2HOm6U5_pQkHudAuzgL46QYnVg5WNv-2K9H8hDsNVGUtFifICuhdcCzBWich3V/pub?gid=768994311&single=true&output=csv' },
  { label: 'Junio 2026', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSR-jEHWGJNTU5Wk2HOm6U5_pQkHudAuzgL46QYnVg5WNv-2K9H8hDsNVGUtFifICuhdcCzBWich3V/pub?gid=1978138079&single=true&output=csv' }
  // Para agregar un mes: { label: 'Julio 2026', url: 'URL_CSV_AQUI' }
];

const PALETTE = ['#378ADD','#1D9E75','#EF9F27','#7F77DD','#D4537E','#D85A30','#639922','#888780','#185FA5','#5DCAA5','#F09595','#B4B2A9'];

let mesActivo = MESES.length - 1;
let donutInst = null, barInst = null;

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function parseMonto(s) {
  if (!s) return 0;
  let str = s.toString().trim();
  // Quitar símbolo $ y espacios
  str = str.replace(/\$/g, '').replace(/\s/g, '');
  // Formato argentino: puntos = miles, coma = decimal → "1.470.454,96"
  // Detectar si tiene coma como separador decimal
  const tieneComaDecimal = /,\d{1,2}$/.test(str);
  if (tieneComaDecimal) {
    str = str.replace(/\./g, '').replace(',', '.');
  } else {
    // Formato con punto decimal → "1470.96"
    str = str.replace(/,/g, '');
  }
  return parseFloat(str) || 0;
}

function parseDate(s) {
  if (!s) return null;
  const parts = s.trim().split('/');
  if (parts.length === 3) return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  return null;
}

function buildSelector() {
  const sel = document.getElementById('monthSelector');
  sel.innerHTML = MESES.map((m, i) =>
    `<button class="month-btn ${i === mesActivo ? 'active' : ''}" onclick="cambiarMes(${i})">${m.label}</button>`
  ).join('');
}

function cambiarMes(idx) {
  mesActivo = idx;
  buildSelector();
  loadData();
}

function showError(msg) {
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('content').style.display = 'none';
}

function loadData() {
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  Papa.parse(MESES[mesActivo].url, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: (results) => {
      if (!results.data || results.data.length === 0) { showError('No se encontraron datos.'); return; }
      buildDashboard(results.data);
    },
    error: () => showError('No se pudo conectar con Google Sheets. Verificá que el sheet esté publicado.')
  });
}

function buildDashboard(rows) {
  const cols = Object.keys(rows[0]);
  const colFecha = cols[0];
  const colDetalle = cols[1];
  const colCategoria = cols[2];
  const colMonto = cols[3];

  let ingresosLucas = 0, ingresosMari = 0;
  const datos = [];

  rows.forEach(r => {
    const fecha = r[colFecha] ? r[colFecha].trim() : '';
    const cat = r[colCategoria] ? r[colCategoria].trim() : '';
    const monto = parseMonto(r[colMonto]);
    const detalle = (r[colDetalle] || '').trim().toLowerCase();

    if (detalle.includes('ingresos lucas')) { ingresosLucas = monto; return; }
    if (detalle.includes('ingresos mariana')) { ingresosMari = monto; return; }
    if (!fecha || !cat || monto <= 0) return;

    datos.push({ fecha, categoria: cat, monto });
  });

  if (ingresosLucas === 0) ingresosLucas = 3600000;
  if (ingresosMari === 0) ingresosMari = 3600000;

  const totalGastos = datos.reduce((s, r) => s + r.monto, 0);
  const totalIngresos = ingresosLucas + ingresosMari;
  const resto = totalIngresos - totalGastos;
  const pctGastado = ((totalGastos / totalIngresos) * 100).toFixed(1);

  const fechasSorted = [...new Set(datos.map(r => r.fecha))].sort((a, b) => {
    const da = parseDate(a), db = parseDate(b);
    return (!da || !db) ? 0 : da - db;
  });
  const montosPorFecha = fechasSorted.map(f =>
    datos.filter(r => r.fecha === f).reduce((s, r) => s + r.monto, 0)
  );

  const catMap = {};
  datos.forEach(r => { catMap[r.categoria] = (catMap[r.categoria] || 0) + r.monto; });
  const categorias = Object.entries(catMap)
    .sort((a, b) => b[1] - a[1])
    .map(([nombre, monto], i) => ({ nombre, monto, color: PALETTE[i % PALETTE.length] }));

  document.getElementById('dashSub').textContent = `${datos.length} movimientos · ${MESES[mesActivo].label}`;

  document.getElementById('metricsBox').innerHTML = `
    <div class="metric"><p class="metric-label">Ingresos Lucas</p><p class="metric-value">${fmt(ingresosLucas)}</p></div>
    <div class="metric"><p class="metric-label">Ingresos Mariana</p><p class="metric-value">${fmt(ingresosMari)}</p></div>
    <div class="metric"><p class="metric-label">Total ingresos</p><p class="metric-value">${fmt(totalIngresos)}</p></div>
    <div class="metric"><p class="metric-label">Total gastos</p><p class="metric-value danger">${fmt(totalGastos)}</p></div>
    <div class="metric"><p class="metric-label">Resto</p><p class="metric-value success">${fmt(resto)}</p></div>
    <div class="metric"><p class="metric-label">% gastado</p><p class="metric-value">${pctGastado}%</p></div>
  `;

  const gridColor = 'rgba(255,255,255,0.06)';
  const textColor = '#555';

  if (donutInst) donutInst.destroy();
  donutInst = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: categorias.map(c => c.nombre),
      datasets: [{ data: categorias.map(c => c.monto), backgroundColor: categorias.map(c => c.color), borderWidth: 2, borderColor: '#0f0f0f' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)} (${((ctx.raw/totalGastos)*100).toFixed(1)}%)` } }
      }
    }
  });

  document.getElementById('donutLegend').innerHTML = categorias.slice(0, 6).map(c =>
    `<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.nombre.split(' ')[0]} ${((c.monto/totalGastos)*100).toFixed(1)}%</span>`
  ).join('');

  if (barInst) barInst.destroy();
  barInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: fechasSorted,
      datasets: [{ data: montosPorFecha, backgroundColor: '#378ADD55', borderColor: '#378ADD', borderWidth: 1.5, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, maxRotation: 45, autoSkip: false } },
        y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 }, callback: v => '$' + (v >= 1000 ? Math.round(v/1000)+'k' : v) } }
      }
    }
  });

  document.getElementById('rankingTable').innerHTML = categorias.map((c, i) => {
    const pct = ((c.monto / totalGastos) * 100).toFixed(1);
    return `<tr>
      <td>${i+1}</td>
      <td>${c.nombre}<div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c.color};"></div></div></td>
      <td>${fmt(c.monto)}<br><span class="pct-label">${pct}%</span></td>
    </tr>`;
  }).join('');

  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

buildSelector();
loadData();
</script>
</body>
</html>
